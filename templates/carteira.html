<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1214; color: #e0e0e0; }
        .card-custom { background-color: #1c1f22; border: 1px solid #2a2e33; border-radius: 12px; }
        .nav-link.active { color: #36A2EB !important; font-weight: bold; border-bottom: 2px solid #36A2EB; }
    </style>
</head>
<body class="py-4">
    <div class="container">
        
        <ul class="nav nav-pills justify-content-center mb-5">
            <li class="nav-item"><a href="/" class="nav-link text-light">📊 Mercado Agora</a></li>
            <li class="nav-item"><a href="/carteira" class="nav-link active">💰 Minha Carteira</a></li>
        </ul>

        <div class="row g-4">
            <div class="col-md-7">
                <div class="card card-custom p-4 mb-4 border-start border-4 border-primary">
                    <h5 class="text-muted text-uppercase mb-2">Patrimônio Total Estimado</h5>
                    <h1 class="display-4 fw-bold text-white">R$ {{ patrimonio }}</h1>
                </div>

                <div class="card card-custom p-3">
                    <h5 class="mb-3">Detalhamento dos Ativos</h5>
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr class="text-secondary">
                                <th>Ativo</th>
                                <th>Qtd</th>
                                <th>Preço Atual</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in detalhes %}
                            <tr>
                                <td class="fw-bold">{{ item.acao }}</td>
                                <td>{{ item.qtd }}</td>
                                <td>R$ {{ item.preco }} <small class="{{ 'text-success' if item.variacao >=0 else 'text-danger' }}">({{ item.variacao }}%)</small></td>
                                <td class="text-end fw-bold text-primary">R$ {{ item.total }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card card-custom p-4 h-100">
                    <h5 class="mb-4 text-center">Alocação da Carteira</h5>
                    <div style="height: 300px; position: relative;">
                        <canvas id="graficoPizza"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('graficoPizza').getContext('2d');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: labels,
        datasets: [{
            data: data,
            backgroundColor: ['#36A2EB','#FF6384','#4BC0C0','#FF9F40','#9966FF'],
            borderWidth: 0,
            hoverOffset: 10
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: 'bottom',
                labels: {
                    color: '#e0e0e0',
                    padding: 20
                }
            }
        },
        layout: {
            padding: 20
        }
    }
});
</script>
